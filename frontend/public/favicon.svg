<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#0000ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glowing hexagon -->
  <polygon points="50,15 80,32.5 80,67.5 50,85 20,67.5 20,32.5" stroke="url(#neonGrad)" stroke-width="6" fill="none" filter="url(#glow)" opacity="0.9" />
  <!-- Center letter 'P' stylized -->
  <text x="50" y="67" font-family="'Outfit', 'Inter', sans-serif" font-size="46" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">P</text>
</svg>